<!DOCTYPE html>
<html lang="en">

<head>
  <title> Tic Tac Toe</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style type="text/css">
    body {
      background: linear-gradient(0deg, rgba(2, 0, 36, 0.76) 0%, rgba(116, 116, 181, 0.78) 35%, rgba(163, 233, 247, 0.88) 100%);

      .container {
        grid-template-columns: auto auto auto;
        border-radius: 5px;
        display: grid;
        flex-direction: row;
        align-items: flex-start;
        border: 500px none #1db4fad4;
        border-collapse: collapse;
      }

      .container_001 {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 20px;
      }

      .button {
        background-color: #22282cb4;
        border: none;
        color: white;
        padding: 15px 32px;
        border-radius: 15px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        position: relative;
      }

      .box:hover {
        background: linear-gradient(180deg, rgba(210, 123, 247, 0.35) 10%, rgba(252, 192, 71, 0.35) 50%);
      }

      .box h3 {
        font-size: 24px;
        color: #3545C5;
        font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
      }

      .box {
        border: 1px solid #fafafad4;
        max-width: 250px;
        width: 100%;
        border-radius: 20%;
        text-align: center;
        display: inline-block;
        min-height: 250px;
        vertical-align: top;
        margin: 15px;
        padding: 10px;
        font-size: 30px;
      }

      h1 {
        font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
        color: rgba(0, 11, 46, 0.793);
        text-align: center;
      }

      #card001,
      #card002,
      #card003,
      #card004,
      #card005,
      #card006,
      #card007,
      #card008,
      #card009 {
        font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
        color: rgba(0, 11, 46, 0.793);
        text-align: center;
      }
  </style>
</head>

<body>
  <p style="text-align: center; font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">
    This is The
  </p>
  <h1 style="text-align: center; font: 3.6em courier;">Tic Tac Toe Game</h1>
  <div class="container-002" id="x-turn"
    style="border:1px white dashed; font-size:38px; font-family:courier; text-align:center;">
    X Turn to start
  </div>
  <div class="container">
    <script>
    const NUM_SQUARES = 9;
    let currentPlayer = "X";
    let gameOver = false;

    window.onload = function () {
        const container = document.querySelector('.container');
        const message = document.getElementById("x-turn");

        // optional random start
        currentPlayer = Math.random() < 0.5 ? "X" : "O";
        message.innerText = currentPlayer + " Turn to start";

        // create squares sq0..sq8
        for (let i = 0; i < NUM_SQUARES; i++) {
            const card = document.createElement("div");
            card.className = "box";
            card.id = "sq" + i; // IMPORTANT: sq0..sq8 per instructions

            card.addEventListener("click", function () {
                if (gameOver) return;            // no moves if game ended
                if (this.innerText !== "") return; // ignore filled square

                // place X or O
                this.innerText = currentPlayer;

                // --- USING map() TO BUILD moves FROM THE BOARD ---
                const squares = document.querySelectorAll(".box"); // sq0..sq8
                const moves = Array.from(squares).map(sq => {
                    const val = sq.innerText.trim();
                    return val === "" ? "-" : val; // empty => '-'
                });
                // moves[0] is value of sq0, moves[1] is sq1, etc.

                // --- BUILD winConditions FROM moves ---
                const winConditions = [
                    // rows
                    moves[0] + moves[1] + moves[2],
                    moves[3] + moves[4] + moves[5],
                    moves[6] + moves[7] + moves[8],
                    // cols
                    moves[0] + moves[3] + moves[6],
                    moves[1] + moves[4] + moves[7],
                    moves[2] + moves[5] + moves[8],
                    // diagonals
                    moves[0] + moves[4] + moves[8],
                    moves[2] + moves[4] + moves[6]
                ];

                // check win
                if (winConditions.includes("XXX") || winConditions.includes("OOO")) {
                    gameOver = true;
                    const winner = winConditions.includes("XXX") ? "X" : "O";
                    alert("Congratulations! " + winner + " Wins!");
                    message.innerText = winner + " Wins! Click Start Game to play again.";
                    return;
                }

                // check stalemate: no '-' in moves
                if (!moves.includes("-")) {
                    gameOver = true;
                    alert("Stalemate! No more moves.");
                    message.innerText = "Stalemate! Click Start Game to play again.";
                    return;
                }

                // otherwise game continues
                currentPlayer = (currentPlayer === "X") ? "O" : "X";
                message.innerText = currentPlayer + " Turn";
            });

            container.appendChild(card);
        }

        // Start Game button: clear the board
        const startButton = document.getElementById("startGame");
        startButton.addEventListener("click", function () {
            const squares = document.querySelectorAll(".box");
            squares.forEach(sq => sq.innerText = "");
            gameOver = false;
            currentPlayer = "X"; // or random again
            message.innerText = currentPlayer + " Turn to start";
        });

        // your extra X button behavior
        const cardClick = document.getElementById("button_1");
        function writeX() {
            message.innerText = "You will Find O on the 6th Card/Square!";
        }
        if (cardClick) {
            cardClick.addEventListener("click", writeX);
        }
    };
</script>
  </div>
  <div class="container_001">
    <div id="button_1" class="button_1" value="XsTurn" onclick="dosomething_1()">
      <button onclick="alert('Should We Get Started?')"> X's Turn Start</button>
    </div>
    <div id="button_2" class="button_2" value="OsTurn" onclick="dosomething_2()">
      <button onclick="alert('Please Take Your Turn.')">O's turn</button>
    </div>
    <div class="button">
      <form action="https://en.wikipedia.org/wiki/Tic-tac-toe" method="get" target="_blank">
        <button type="submit">Link Info Page</button>
      </form>
    </div>
  </div>
</body>

</html>
